<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="100%" height="100%">
  <defs>
    <!-- Frosted Outer Bevel Gradient -->
    <linearGradient id="outerBevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)" />
      <stop offset="30%" stop-color="rgba(220,235,255,0.18)" />
      <stop offset="70%" stop-color="rgba(180,210,250,0.12)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)" />
    </linearGradient>

    <!-- Slab Core Acrylic Body -->
    <linearGradient id="acrylicBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(240,248,255,0.14)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="100%" stop-color="rgba(220,240,255,0.16)" />
    </linearGradient>

    <!-- Inner Recess Lip -->
    <linearGradient id="recessBevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,10,30,0.45)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)" />
    </linearGradient>

    <!-- Grading Label Silver/Grey Metallic Foil -->
    <linearGradient id="labelFoil" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="25%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="75%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Glass Sheen Diagonal -->
    <linearGradient id="glassSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
      <stop offset="35%" stop-color="rgba(255,255,255,0.02)" />
      <stop offset="65%" stop-color="rgba(255,255,255,0.0)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.22)" />
    </linearGradient>
  </defs>

  <!-- 1. Thick Outer Acrylic Slab Frame (Frosted Polycarbonate) -->
  <rect x="4" y="4" width="392" height="552" rx="18" ry="18" fill="url(#acrylicBody)" stroke="url(#outerBevel)" stroke-width="8" />
  
  <!-- Outer Rim Highlights & Bumpers -->
  <rect x="10" y="10" width="380" height="540" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" />
  <circle cx="22" cy="22" r="3.5" fill="rgba(255,255,255,0.25)" />
  <circle cx="378" cy="22" r="3.5" fill="rgba(255,255,255,0.25)" />
  <circle cx="22" cy="538" r="3.5" fill="rgba(255,255,255,0.25)" />
  <circle cx="378" cy="538" r="3.5" fill="rgba(255,255,255,0.25)" />

  <!-- 2. Top Grading Label Recess Slot (Sleek and compact: y=16 to y=72) -->
  <rect x="18" y="16" width="364" height="56" rx="8" ry="8" fill="rgba(10,14,24,0.94)" stroke="url(#recessBevel)" stroke-width="2.5" />
  <rect x="21" y="19" width="358" height="50" rx="6" ry="6" fill="url(#labelFoil)" opacity="0.12" />

  <!-- Top Grading Label Chamber (Empty recess ready for dynamic label overlay) -->

  <!-- 3. Recessed Card Chamber (Spacious standard size: y=80 down to 544 -> width 364, height 464) -->
  <rect x="18" y="80" width="364" height="464" rx="10" ry="10" fill="none" stroke="url(#recessBevel)" stroke-width="3" />
  <rect x="21" y="83" width="358" height="458" rx="8" ry="8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />

  <!-- 4. Front Crystal Acrylic Sheen & Reflections -->
  <path d="M 12 18 L 240 12 L 80 548 L 12 548 Z" fill="url(#glassSheen)" opacity="0.22" pointer-events="none" />
</svg>
